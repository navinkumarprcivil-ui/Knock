<!DOCTYPE html>
<!--

  Copyright (c) 2026 Kuboos. All rights reserved.

  A single-file card memory matching game styled after modern mobile
  card games: curved 3D planet background, glossy chunky HUD, buttery
  rotateY card flips, match glow + float-off, mismatch shake, synth SFX.
  Zero dependencies — pure HTML/CSS/JS, works fully offline.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Memory Match 🃏</title>
<style>
  /* ════════════════════════════════════════════════════════════
     1. THEME TOKENS — glossy saturated primaries
     ════════════════════════════════════════════════════════════ */
  :root {
    --sky-top:    #4fc3f7;
    --sky-bottom: #81d4fa;
    --grass:      #7ac74f;
    --grass-deep: #5aa63a;
    --grass-dark: #47882e;
    --red:    #e0273a;  --red-deep:    #a4121f;
    --blue:   #1f7ee8;  --blue-deep:   #1257ad;
    --green:  #2fae4a;  --green-deep:  #1e7d33;
    --yellow: #ffca1f;  --yellow-deep: #e8a400;
    --ink:    #17223b;
    --white:  #ffffff;
    --card-shadow:      0 6px 14px rgba(10, 40, 60, 0.35);
    --card-shadow-lift: 0 22px 40px rgba(10, 40, 60, 0.45);
    --hud-shadow:       0 8px 0 rgba(23, 34, 59, 0.18), 0 12px 24px rgba(23, 34, 59, 0.25);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    font-family: 'Nunito', 'Trebuchet MS', 'Arial Rounded MT Bold', -apple-system, sans-serif;
    font-weight: 800;
    color: var(--ink);
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    background: var(--sky-top);
  }

  /* ════════════════════════════════════════════════════════════
     2. THE WORLD — sky, drifting clouds, curved planet horizon
     ════════════════════════════════════════════════════════════ */
  .world {
    position: fixed; inset: 0; overflow: hidden;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 55%, #b3e5fc 100%);
  }

  /* Giant circle whose top edge forms the curved "globe" horizon */
  .planet {
    position: absolute; left: 50%; top: 34%;
    width: 300vmax; height: 300vmax;
    transform: translateX(-50%);
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 0%,
        #9be26e 0%, var(--grass) 18%, var(--grass-deep) 45%, var(--grass-dark) 75%);
    box-shadow: inset 0 30px 60px rgba(255,255,255,0.35), 0 -12px 40px rgba(30, 90, 40, 0.35);
  }
  /* Soft highlight "spotlight" under the play area */
  .planet::before {
    content: ""; position: absolute; left: 50%; top: 0.4%;
    width: 40vmax; height: 12vmax; transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
  }
  /* Rounded hills peeking over the horizon */
  .hill {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #8fd75f, var(--grass-deep));
    box-shadow: inset -8px -10px 24px rgba(30, 90, 40, 0.4);
  }
  .hill.h1 { width: 34vmin; height: 34vmin; left: -8vmin;  top: 24%; }
  .hill.h2 { width: 26vmin; height: 26vmin; right: -6vmin; top: 22%; }
  .hill.h3 { width: 18vmin; height: 18vmin; left: 16vmin;  top: 20%; }

  /* Puffy clouds drifting across the sky */
  .cloud {
    position: absolute; height: 5vmin; border-radius: 999px;
    background: rgba(255, 255, 255, 0.92);
    box-shadow: 0 6px 18px rgba(60, 130, 180, 0.25);
    animation: cloud-drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: ""; position: absolute; background: inherit; border-radius: 50%;
  }
  .cloud::before { width: 55%; height: 160%; left: 12%; bottom: 26%; }
  .cloud::after  { width: 42%; height: 120%; right: 14%; bottom: 30%; }
  .cloud.c1 { width: 22vmin; top: 7%;  animation-duration: 52s; }
  .cloud.c2 { width: 15vmin; top: 15%; animation-duration: 74s; animation-delay: -30s; opacity: 0.85; }
  .cloud.c3 { width: 11vmin; top: 3%;  animation-duration: 63s; animation-delay: -50s; opacity: 0.7; }
  @keyframes cloud-drift {
    from { left: -26vmin; }
    to   { left: 104vw; }
  }

  /* Slow-spinning dashed ring under the board — playful "table" marker */
  .spin-ring {
    position: absolute; left: 50%; top: 54%;
    width: min(120vmin, 640px); height: min(66vmin, 360px);
    margin: calc(min(66vmin, 360px) / -2) 0 0 calc(min(120vmin, 640px) / -2);
    border: 1.2vmin dashed rgba(255, 255, 255, 0.28);
    border-radius: 50%;
    animation: ring-spin 40s linear infinite;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }

  /* ════════════════════════════════════════════════════════════
     3. HUD — chunky glossy pills & avatar chips at the corners
     ════════════════════════════════════════════════════════════ */
  .hud-pill {
    position: fixed; z-index: 30;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: linear-gradient(180deg, #ffffff 0%, #eef3f8 100%);
    border-radius: 999px;
    box-shadow: var(--hud-shadow);
    font-size: clamp(15px, 2.4vmin, 20px);
    font-weight: 900; letter-spacing: 0.5px;
    animation: hud-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  .hud-pill .ico {
    display: inline-flex; align-items: center; justify-content: center;
    width: 1.8em; height: 1.8em; border-radius: 50%;
    background: linear-gradient(180deg, var(--yellow), var(--yellow-deep));
    box-shadow: inset 0 2px 2px rgba(255,255,255,0.55), 0 2px 4px rgba(0,0,0,0.2);
    font-size: 0.95em;
  }
  #timerPill { top: 14px; left: 14px; animation-delay: 0.05s; }
  #movesPill { top: 14px; right: 14px; animation-delay: 0.15s; }
  @keyframes hud-pop {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* Corner avatar chips (player + best score) */
  .avatar-chip {
    position: fixed; z-index: 30;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    animation: hud-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  .avatar-chip .face-box {
    width: clamp(48px, 8vmin, 68px); height: clamp(48px, 8vmin, 68px);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(26px, 4.6vmin, 40px);
    border-radius: 22%;
    background: linear-gradient(180deg, #ffffff, #dbe7f2);
    border: 3px solid var(--white);
    box-shadow: var(--hud-shadow);
  }
  .avatar-chip .tag {
    background: rgba(23, 34, 59, 0.75); color: var(--white);
    font-size: clamp(10px, 1.7vmin, 13px); font-weight: 900;
    padding: 3px 12px; border-radius: 999px; letter-spacing: 1px;
    white-space: nowrap;
  }
  #youChip  { left: 14px;  bottom: 18px; animation-delay: 0.25s; }
  #bestChip { right: 96px; bottom: 18px; animation-delay: 0.35s; }
  #youChip .face-box { border-color: var(--blue); }
  #bestChip .face-box { border-color: var(--yellow); }

  /* Big glossy round restart button — like a mobile game's action button */
  .big-btn {
    position: fixed; right: 16px; bottom: 16px; z-index: 30;
    width: clamp(58px, 9.5vmin, 76px); height: clamp(58px, 9.5vmin, 76px);
    border: none; border-radius: 50%; cursor: pointer;
    font-size: clamp(24px, 4.4vmin, 34px); color: var(--white);
    background: radial-gradient(circle at 50% 30%, #ff9d5c 0%, #f4511e 55%, #bf360c 100%);
    box-shadow:
      inset 0 3px 4px rgba(255,255,255,0.5),
      0 0 0 5px rgba(191, 54, 12, 0.55),
      0 8px 0 #7f2408, 0 14px 22px rgba(0,0,0,0.35);
    transition: transform 0.1s, box-shadow 0.1s;
    animation: hud-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s backwards;
  }
  .big-btn:active {
    transform: translateY(6px);
    box-shadow:
      inset 0 3px 4px rgba(255,255,255,0.5),
      0 0 0 5px rgba(191, 54, 12, 0.55),
      0 2px 0 #7f2408, 0 6px 12px rgba(0,0,0,0.35);
  }
  .mini-btn {
    position: fixed; left: 14px; top: 72px; z-index: 30;
    width: 40px; height: 40px; border: none; border-radius: 50%;
    background: rgba(255,255,255,0.9); cursor: pointer; font-size: 18px;
    box-shadow: 0 4px 0 rgba(23,34,59,0.15), 0 8px 14px rgba(23,34,59,0.2);
  }

  /* ════════════════════════════════════════════════════════════
     4. THE BOARD — 4×4 grid tilted gently onto the planet
     ════════════════════════════════════════════════════════════ */
  .stage {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    perspective: 1400px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(8px, 1.6vmin, 14px);
    width: min(92vw, 58vh, 470px);
    transform: rotateX(9deg);          /* subtle lean-back = sitting on the globe */
    margin-top: 4vh;
  }

  /* ════════════════════════════════════════════════════════════
     5. CARDS — bold backs, vibrant fronts, buttery 3D flips
     ════════════════════════════════════════════════════════════ */
  /* IMPORTANT 3D structure: perspective lives on .card ONLY, preserve-3d on
     .card-inner ONLY, and faces have NO overflow clipping. Nesting extra 3D
     contexts (or clipping the faces) triggers a Chromium compositing bug
     where backface-visibility is ignored and the back renders mirrored. */
  .card {
    position: relative;
    aspect-ratio: 2 / 2.9;
    cursor: pointer;
    perspective: 900px;
    animation: deal-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) backwards;
  }
  /* Staggered deal: JS sets --deal per card */
  .card { animation-delay: calc(var(--deal, 0) * 60ms); }
  @keyframes deal-in {
    from { opacity: 0; transform: translateY(-9vh) scale(0.3) rotate(-10deg); }
    to   { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
  }

  .card-inner {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    /* THE flip: 0.6s with a slightly bouncy curve for a satisfying settle */
    transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.15);
    border-radius: 12%/8%;
    box-shadow: var(--card-shadow);
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }

  /* Hover lift — only face-down, playable cards */
  @media (hover: hover) {
    .card:not(.flipped):not(.matched):hover .card-inner {
      transform: translateY(-10px) scale(1.06);
      box-shadow: var(--card-shadow-lift);
    }
  }
  .card:not(.flipped):not(.matched):active .card-inner { transform: scale(0.96); }

  .face {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12%/8%;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border: 3px solid var(--white);
  }

  /* — BACK: dark card with bold rotated ellipse emblem — */
  .face.back {
    background:
      linear-gradient(135deg, rgba(255,255,255,0.10) 0%, transparent 45%),
      linear-gradient(180deg, #232c4b 0%, #131a33 100%);
  }
  .back-ellipse {
    width: 78%; height: 52%;
    display: flex; align-items: center; justify-content: center;
    transform: rotate(-24deg);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff6b6b, var(--red) 45%, var(--red-deep));
    border: 3px solid var(--yellow);
    box-shadow: 0 4px 10px rgba(0,0,0,0.45), inset 0 2px 3px rgba(255,255,255,0.35);
  }
  .back-ellipse span {
    font-size: clamp(18px, 4.4vmin, 34px); font-weight: 900; color: var(--white);
    font-style: italic; letter-spacing: 1px;
    text-shadow: 0 3px 0 rgba(0,0,0,0.35);
    transform: rotate(2deg);
  }

  /* — FRONT: saturated color, big symbol in a white ellipse, corner minis — */
  .face.front { transform: rotateY(180deg); color: var(--white); }
  .face.front::before {           /* glossy top sheen */
    content: ""; position: absolute; inset: 0;
    border-radius: inherit;       /* faces no longer clip, so round the sheen itself */
    background: linear-gradient(160deg, rgba(255,255,255,0.35) 0%, transparent 38%);
  }
  .front-ellipse {
    width: 76%; height: 58%;
    display: flex; align-items: center; justify-content: center;
    transform: rotate(-18deg);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.94);
    box-shadow: 0 4px 8px rgba(0,0,0,0.28), inset 0 -3px 6px rgba(0,0,0,0.08);
  }
  .front-ellipse span {
    font-size: clamp(22px, 5.4vmin, 42px);
    transform: rotate(18deg);
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.25));
  }
  .corner { position: absolute; font-size: clamp(11px, 2vmin, 16px); text-shadow: 0 2px 2px rgba(0,0,0,0.3); }
  .corner.tl { top: 5%; left: 9%; }
  .corner.br { bottom: 5%; right: 9%; transform: rotate(180deg); }

  .front-red    { background: linear-gradient(180deg, #ff5468, var(--red) 55%, var(--red-deep)); }
  .front-blue   { background: linear-gradient(180deg, #55a4ff, var(--blue) 55%, var(--blue-deep)); }
  .front-green  { background: linear-gradient(180deg, #5fd67a, var(--green) 55%, var(--green-deep)); }
  .front-yellow { background: linear-gradient(180deg, #ffe066, var(--yellow) 55%, var(--yellow-deep)); }

  /* ════════════════════════════════════════════════════════════
     6. FEEDBACK ANIMATIONS — match glow/float, mismatch shake
     ════════════════════════════════════════════════════════════ */
  /* MATCH: pulse + golden glow, then drift up and pop away
     (grid slot is preserved; the card just fades from view) */
  .card.matched { pointer-events: none; }
  .card.matched .card-inner {
    animation:
      match-pulse 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
      match-away  0.7s ease-in 0.75s forwards;
  }
  @keyframes match-pulse {
    0%   { transform: rotateY(180deg) scale(1); }
    45%  { transform: rotateY(180deg) scale(1.18);
           box-shadow: 0 0 0 6px rgba(255, 214, 64, 0.9), 0 0 44px 16px rgba(255, 202, 31, 0.8); }
    100% { transform: rotateY(180deg) scale(1);
           box-shadow: 0 0 0 3px rgba(255, 214, 64, 0.7), 0 0 26px 8px rgba(255, 202, 31, 0.55); }
  }
  @keyframes match-away {
    0%   { transform: rotateY(180deg) scale(1); opacity: 1; }
    100% { transform: rotateY(180deg) translateY(-13vh) scale(0.15) rotate(16deg); opacity: 0; }
  }

  /* MISMATCH: quick indignant shake before flipping back (JS removes .flipped) */
  .card.shake { animation: card-shake 0.42s ease; }
  @keyframes card-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-3deg); }
    40% { transform: translateX(8px)  rotate(3deg); }
    60% { transform: translateX(-6px) rotate(-2deg); }
    80% { transform: translateX(6px)  rotate(2deg); }
  }

  /* Confetti particles sprayed on every match */
  .spark {
    position: fixed; z-index: 60; pointer-events: none;
    width: 10px; height: 10px; border-radius: 3px;
    animation: spark-fly 0.9s cubic-bezier(0.2, 0.6, 0.4, 1) forwards;
  }
  @keyframes spark-fly {
    0%   { transform: translate(0, 0) scale(1) rotate(0); opacity: 1; }
    100% { transform: translate(var(--sx), var(--sy)) scale(0.2) rotate(340deg); opacity: 0; }
  }

  /* ════════════════════════════════════════════════════════════
     7. WIN OVERLAY
     ════════════════════════════════════════════════════════════ */
  .win-overlay {
    position: fixed; inset: 0; z-index: 80;
    display: none; align-items: center; justify-content: center;
    background: rgba(15, 30, 60, 0.55); backdrop-filter: blur(5px);
  }
  .win-overlay.show { display: flex; }
  .win-panel {
    background: linear-gradient(180deg, #ffffff, #e8f1fa);
    border-radius: 28px; padding: 32px 40px; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45), inset 0 0 0 4px var(--yellow);
    animation: hud-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 90vw;
  }
  .win-panel .trophy { font-size: 64px; animation: trophy-bounce 1.2s ease-in-out infinite; display: inline-block; }
  @keyframes trophy-bounce {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .win-panel h1 {
    margin: 8px 0 4px; font-size: clamp(28px, 6vmin, 44px); font-weight: 900;
    background: linear-gradient(180deg, var(--yellow), #f4511e);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: 2px;
  }
  .win-panel .stats { font-size: 16px; margin: 10px 0 4px; color: #45536e; }
  .win-panel .stats b { color: var(--ink); }
  .win-panel .record { color: #f4511e; font-weight: 900; font-size: 14px; min-height: 20px; }
  .play-again {
    margin-top: 16px; border: none; cursor: pointer;
    padding: 14px 34px; border-radius: 999px;
    font-family: inherit; font-size: 18px; font-weight: 900; letter-spacing: 1px;
    color: var(--white); text-transform: uppercase;
    background: linear-gradient(180deg, #5fd67a, var(--green) 55%, var(--green-deep));
    box-shadow: inset 0 2px 3px rgba(255,255,255,0.5), 0 6px 0 #17632a, 0 12px 20px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .play-again:active {
    transform: translateY(5px);
    box-shadow: inset 0 2px 3px rgba(255,255,255,0.5), 0 1px 0 #17632a, 0 5px 10px rgba(0,0,0,0.3);
  }

  /* ════════════════════════════════════════════════════════════
     8. ACCESSIBILITY — flatten motion when the user asks for it
     ════════════════════════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    .cloud, .spin-ring, .card, .hud-pill, .avatar-chip, .big-btn,
    .win-panel, .win-panel .trophy, .spark { animation: none !important; }
    .card-inner { transition-duration: 0.15s; }
  }
</style>
</head>
<body>

  <!-- The world: sky, clouds, curved planet, hills, spinning ring -->
  <div class="world" aria-hidden="true">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="planet"></div>
    <div class="hill h1"></div>
    <div class="hill h2"></div>
    <div class="hill h3"></div>
    <div class="spin-ring"></div>
  </div>

  <!-- HUD -->
  <div class="hud-pill" id="timerPill"><span class="ico">⏱</span><span id="timer">00:00</span></div>
  <div class="hud-pill" id="movesPill"><span class="ico">🎯</span><span id="moves">0 moves</span></div>

  <div class="avatar-chip" id="youChip">
    <div class="face-box">😎</div>
    <div class="tag">YOU · <span id="pairs">0/8</span></div>
  </div>
  <div class="avatar-chip" id="bestChip">
    <div class="face-box">🏆</div>
    <div class="tag">BEST · <span id="best">—</span></div>
  </div>

  <button class="mini-btn" id="soundBtn" title="Sound on/off">🔊</button>
  <button class="big-btn" id="restartBtn" title="Restart">↻</button>

  <!-- Card board -->
  <div class="stage"><div class="board" id="board"></div></div>

  <!-- Win overlay -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-panel">
      <span class="trophy">🏆</span>
      <h1>YOU WIN!</h1>
      <div class="stats">Time <b id="winTime">00:00</b> · <b id="winMoves">0</b> moves</div>
      <div class="record" id="winRecord"></div>
      <button class="play-again" id="playAgainBtn">Play again</button>
    </div>
  </div>

<script>
"use strict";
/* ══════════════════════════════════════════════════════════════
   MEMORY MATCH — game logic
   Standard rules: flip two cards; matching pairs stay revealed
   (then float away), mismatches shake and flip back. Timer starts
   on the first flip; best time is stored in localStorage.
   ══════════════════════════════════════════════════════════════ */

// ── Tiny Web-Audio synth so flips/matches/errors FEEL responsive ──
const Sfx = {
  ctx: null, on: true,
  ensure() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { this.on = false; }
    }
    if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
  },
  tone(freq, dur, type = "sine", gain = 0.18, when = 0) {
    if (!this.on || !this.ctx) return;
    const t = this.ctx.currentTime + when;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g); g.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + dur + 0.05);
  },
  flip()     { this.tone(520, 0.07, "triangle"); this.tone(760, 0.06, "sine", 0.1, 0.03); },
  match()    { [660, 880, 1100].forEach((f, i) => this.tone(f, 0.16, "triangle", 0.2, i * 0.09)); },
  mismatch() { this.tone(200, 0.16, "sawtooth", 0.12); this.tone(150, 0.2, "sawtooth", 0.12, 0.12); },
  win()      { [523, 659, 784, 1047, 1319].forEach((f, i) => this.tone(f, 0.22, "triangle", 0.22, i * 0.12)); },
};

// ── Pair definitions: symbol + one of the four glossy colors ──
const PAIRS = [
  { sym: "⭐", color: "yellow" },
  { sym: "🔥", color: "red"    },
  { sym: "🍀", color: "green"  },
  { sym: "⚡", color: "blue"   },
  { sym: "💎", color: "blue"   },
  { sym: "🎈", color: "red"    },
  { sym: "🚀", color: "green"  },
  { sym: "🎵", color: "yellow" },
];

const board      = document.getElementById("board");
const timerEl    = document.getElementById("timer");
const movesEl    = document.getElementById("moves");
const pairsEl    = document.getElementById("pairs");
const bestEl     = document.getElementById("best");
const winOverlay = document.getElementById("winOverlay");

let firstCard = null;   // first card of the current guess
let lockBoard = false;  // true while a mismatch resolves
let moves = 0, matched = 0;
let seconds = 0, timerId = null, started = false;

// ── Helpers ──
function shuffle(arr) {           // Fisher–Yates
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const fmt = s => String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");

function loadBest() {
  const b = parseInt(localStorage.getItem("memory-best") || "0", 10);
  bestEl.textContent = b > 0 ? fmt(b) : "—";
  return b;
}

function startTimer() {
  if (started) return;
  started = true;
  timerId = setInterval(() => { seconds++; timerEl.textContent = fmt(seconds); }, 1000);
}
function stopTimer() { clearInterval(timerId); timerId = null; }

// ── Build the board: 8 pairs → 16 shuffled cards ──
function buildBoard() {
  board.innerHTML = "";
  const deck = shuffle(PAIRS.flatMap((p, id) => [{ ...p, id }, { ...p, id }]));
  deck.forEach((cardData, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.pair = cardData.id;
    card.style.setProperty("--deal", i);       // stagger the deal-in animation
    card.innerHTML =
      '<div class="card-inner">' +
        '<div class="face back"><div class="back-ellipse"><span>K!</span></div></div>' +
        '<div class="face front front-' + cardData.color + '">' +
          '<span class="corner tl">' + cardData.sym + "</span>" +
          '<div class="front-ellipse"><span>' + cardData.sym + "</span></div>" +
          '<span class="corner br">' + cardData.sym + "</span>" +
        "</div>" +
      "</div>";
    card.addEventListener("click", () => onFlip(card));
    board.appendChild(card);
  });
}

// ── Core memory logic ──
function onFlip(card) {
  if (lockBoard) return;
  if (card === firstCard) return;
  if (card.classList.contains("flipped") || card.classList.contains("matched")) return;

  Sfx.ensure();
  startTimer();
  card.classList.add("flipped");
  Sfx.flip();

  if (!firstCard) { firstCard = card; return; }   // first pick — wait for second

  // Second pick — count the move and compare
  moves++;
  movesEl.textContent = moves + (moves === 1 ? " move" : " moves");

  if (card.dataset.pair === firstCard.dataset.pair) {
    resolveMatch(firstCard, card);
  } else {
    resolveMismatch(firstCard, card);
  }
  firstCard = null;
}

function resolveMatch(a, b) {
  matched++;
  pairsEl.textContent = matched + "/" + PAIRS.length;
  a.classList.add("matched");
  b.classList.add("matched");
  Sfx.match();
  sprayConfetti(a); sprayConfetti(b);
  if (matched === PAIRS.length) setTimeout(showWin, 1200);
}

function resolveMismatch(a, b) {
  lockBoard = true;
  // Let the second card finish most of its flip, then shake both & flip back
  setTimeout(() => {
    a.classList.add("shake"); b.classList.add("shake");
    Sfx.mismatch();
  }, 550);
  setTimeout(() => {
    a.classList.remove("flipped", "shake");
    b.classList.remove("flipped", "shake");
    lockBoard = false;
  }, 1050);
}

// ── Confetti burst at a card's position ──
const SPARK_COLORS = ["#ffca1f", "#e0273a", "#1f7ee8", "#2fae4a", "#ffffff"];
function sprayConfetti(card) {
  const r = card.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  for (let i = 0; i < 9; i++) {
    const s = document.createElement("div");
    s.className = "spark";
    s.style.left = cx + "px";
    s.style.top = cy + "px";
    s.style.background = SPARK_COLORS[i % SPARK_COLORS.length];
    const ang = Math.random() * Math.PI * 2, dist = 60 + Math.random() * 90;
    s.style.setProperty("--sx", Math.cos(ang) * dist + "px");
    s.style.setProperty("--sy", Math.sin(ang) * dist - 40 + "px");
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 950);
  }
}

// ── Win flow ──
function showWin() {
  stopTimer();
  document.getElementById("winTime").textContent = fmt(seconds);
  document.getElementById("winMoves").textContent = moves;
  const best = loadBest();
  const recordEl = document.getElementById("winRecord");
  if (best === 0 || seconds < best) {
    localStorage.setItem("memory-best", String(seconds));
    recordEl.textContent = "🎉 NEW BEST TIME!";
  } else {
    recordEl.textContent = "";
  }
  loadBest();
  Sfx.win();
  // Celebration confetti rain across the top of the screen
  for (let i = 0; i < 26; i++) {
    setTimeout(() => {
      const fake = { getBoundingClientRect: () => ({
        left: Math.random() * innerWidth, top: innerHeight * 0.22, width: 0, height: 0 }) };
      sprayConfetti(fake);
    }, i * 90);
  }
  winOverlay.classList.add("show");
}

// ── Reset / boot ──
function resetGame() {
  stopTimer();
  started = false; seconds = 0; moves = 0; matched = 0;
  firstCard = null; lockBoard = false;
  timerEl.textContent = "00:00";
  movesEl.textContent = "0 moves";
  pairsEl.textContent = "0/" + PAIRS.length;
  winOverlay.classList.remove("show");
  buildBoard();
}

document.getElementById("restartBtn").addEventListener("click", () => { Sfx.ensure(); Sfx.flip(); resetGame(); });
document.getElementById("playAgainBtn").addEventListener("click", () => { Sfx.ensure(); Sfx.flip(); resetGame(); });
document.getElementById("soundBtn").addEventListener("click", (e) => {
  Sfx.ensure();
  Sfx.on = !Sfx.on;
  e.currentTarget.textContent = Sfx.on ? "🔊" : "🔇";
  if (Sfx.on) Sfx.flip();
});

loadBest();
resetGame();
</script>
</body>
